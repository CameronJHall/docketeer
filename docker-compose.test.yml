services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: docketeer_test
    ports:
       - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d docketeer_test"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
       - db_data:/var/lib/postgresql/data

volumes:
  db_data:
